<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#4466ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>

    <radialGradient id="globeGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cc44ff"/>
      <stop offset="60%" stop-color="#7722cc"/>
      <stop offset="100%" stop-color="#330066"/>
    </radialGradient>

    <radialGradient id="globeGradLight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#dd77ff"/>
      <stop offset="60%" stop-color="#9933cc"/>
      <stop offset="100%" stop-color="#5500aa"/>
    </radialGradient>

    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3366ff"/>
      <stop offset="50%" stop-color="#aa33ff"/>
      <stop offset="100%" stop-color="#ff44cc"/>
    </linearGradient>

    <linearGradient id="visionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44aaff"/>
      <stop offset="50%" stop-color="#6655ff"/>
      <stop offset="100%" stop-color="#cc44ff"/>
    </linearGradient>

    <linearGradient id="pixelGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7744ff"/>
      <stop offset="100%" stop-color="#cc88ff"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlowDark" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlowLight" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* DARK MODE (default) */
    .bg           { fill: #000000; }
    .circuit      { stroke: #00eeff; fill: none; opacity: 0.75; }
    .circuit-dot  { fill: #00eeff; }
    .globe-fill   { fill: url(#globeGrad); opacity: 0.88; }
    .orbit        { stroke: url(#orbitGrad); }
    .pixel        { fill: url(#pixelGrad); opacity: 0.95; }
    .vision-text  { fill: url(#visionGrad); filter: url(#textGlowDark); }
    .dg-text      { fill: #ffffff; }
    .deco-line    { stroke: #6688ff; }
    .under-line   { stroke: #4455cc; opacity: 0.7; }
    .tagline      { fill: #ccccff; }
    .circuit-net  { stroke: #ff66ff; fill: none; opacity: 0.65; }
    .circuit-dot2 { fill: #ff99ff; }

    /* LIGHT MODE */
    @media (prefers-color-scheme: light) {
      .bg           { fill: #ffffff; }
      .circuit      { stroke: #0066bb; fill: none; opacity: 0.65; }
      .circuit-dot  { fill: #0066bb; }
      .globe-fill   { fill: url(#globeGradLight); opacity: 0.92; }
      .orbit        { stroke: url(#orbitGrad); }
      .pixel        { fill: url(#pixelGrad); opacity: 1; }
      .vision-text  { fill: url(#visionGrad); filter: url(#textGlowLight); }
      .dg-text      { fill: #111133; }
      .deco-line    { stroke: #4455cc; }
      .under-line   { stroke: #6677dd; opacity: 0.5; }
      .tagline      { fill: #334488; }
      .circuit-net  { stroke: #9922cc; fill: none; opacity: 0.75; }
      .circuit-dot2 { fill: #aa33cc; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="1200" height="420"/>

  <!-- ===== LOGO MARK ===== -->
  <g transform="translate(40, 25)">

    <!-- V shape -->
    <polygon points="25,12 255,12 194,220 143,136 94,220"
      fill="url(#vGrad)" filter="url(#glow)"/>

    <!-- V inner highlight -->
    <polygon points="25,12 143,12 143,136 94,220"
      fill="url(#vGrad)" opacity="0.45"/>

    <!-- Circuit lines inside V -->
    <g class="circuit" stroke-width="1.5">
      <line x1="70"  y1="65"  x2="118" y2="65"/>
      <line x1="70"  y1="97"  x2="130" y2="97"/>
      <line x1="83"  y1="130" x2="136" y2="130"/>
      <line x1="70"  y1="65"  x2="70"  y2="170"/>
      <line x1="70"  y1="170" x2="97"  y2="202"/>
    </g>
    <circle class="circuit-dot" cx="120" cy="65"  r="4"/>
    <circle class="circuit-dot" cx="132" cy="97"  r="4"/>
    <circle class="circuit-dot" cx="138" cy="130" r="4"/>

    <!-- Globe -->
    <ellipse class="globe-fill" cx="193" cy="156" rx="88" ry="88"/>

    <!-- Circuit network on globe -->
    <g class="circuit-net" stroke-width="1.2">
      <line x1="170" y1="143" x2="202" y2="123"/>
      <line x1="202" y1="123" x2="222" y2="163"/>
      <line x1="222" y1="163" x2="189" y2="188"/>
      <line x1="189" y1="188" x2="170" y2="143"/>
      <line x1="202" y1="123" x2="189" y2="188"/>
    </g>
    <circle class="circuit-dot2" cx="170" cy="143" r="4.5"/>
    <circle class="circuit-dot2" cx="202" cy="123" r="4.5"/>
    <circle class="circuit-dot2" cx="222" cy="163" r="4.5"/>
    <circle class="circuit-dot2" cx="189" cy="188" r="4.5"/>

    <!-- Orbit ring -->
    <ellipse class="orbit" cx="193" cy="153" rx="136" ry="45"
      fill="none" stroke-width="6.5"
      transform="rotate(-20, 193, 153)" filter="url(#glow)"/>

    <!-- Pixel dots top right of V -->
    <g class="pixel">
      <rect x="202" y="6"  width="11" height="11" rx="2"/>
      <rect x="217" y="6"  width="11" height="11" rx="2"/>
      <rect x="232" y="6"  width="11" height="11" rx="2"/>
      <rect x="209" y="21" width="11" height="11" rx="2"/>
      <rect x="224" y="21" width="11" height="11" rx="2"/>
      <rect x="217" y="36" width="11" height="11" rx="2"/>
    </g>

  </g>

  <!-- ===== TEXT SECTION ===== -->
  <g transform="translate(400, 35)">

    <!-- VISION -->
    <text x="0" y="145"
      class="vision-text"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="145"
      font-weight="900"
      letter-spacing="5">VISION</text>

    <!-- Deco lines -->
    <line class="deco-line" x1="0"   y1="170" x2="62"  y2="170" stroke-width="2.5"/>
    <line class="deco-line" x1="710" y1="170" x2="772" y2="170" stroke-width="2.5"/>

    <!-- DIGITAL GROUP -->
    <text x="68" y="203"
      class="dg-text"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="60"
      font-weight="900"
      letter-spacing="7">DIGITAL GROUP</text>

    <!-- Underline -->
    <line class="under-line" x1="0" y1="220" x2="772" y2="220" stroke-width="2"/>

    <!-- Tagline -->
    <text x="68" y="268"
      class="tagline"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="35"
      font-style="italic"
      letter-spacing="1">Innovative Solutions for Your Business</text>

  </g>
</svg>
